<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign In - Portfolio</title>
    <link rel="stylesheet" href="signin.css">
    <script src="signin.js" defer></script>
</head>
<body>
    <div class="signin-container">
        <div class="signin-card">
            <div class="signin-header">
                <h1 id="form-title">Admin Panel</h1>
                <p id="form-subtitle">Sign in to manage your portfolio</p>
            </div>
            
            <!-- Toggle Buttons -->
            <div class="toggle-buttons">
                <button type="button" id="signin-toggle" class="toggle-btn active">Sign In</button>
                <button type="button" id="signup-toggle" class="toggle-btn">Sign Up</button>
            </div>
            
            <!-- Sign In Form -->
            <form id="signin-form" action="admin.html" method="GET">
                <div class="form-group">
                    <label for="signin-username">Username</label>
                    <input type="text" id="signin-username" name="username" required placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="signin-password">Password</label>
                    <input type="password" id="signin-password" name="password" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            
            <!-- Sign Up Form -->
            <form id="signup-form" action="signup_process.php" method="POST" style="display: none;">
                <div class="form-group">
                    <label for="signup-username">Username</label>
                    <input type="text" id="signup-username" name="username" required placeholder="Choose a username">
                </div>
                
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <div class="email-verification-group">
                        <input type="email" id="signup-email" name="email" required placeholder="Enter your email">
                        <button type="button" id="send-code-btn" class="btn btn-secondary">Send Code</button>
                    </div>
                </div>
                
                <div class="form-group" id="verification-code-group" style="display: none;">
                    <label for="verification-code">Email Verification Code</label>
                    <input type="text" id="verification-code" name="verification_code" maxlength="6" placeholder="Enter 6-digit code">
                    <small class="form-text">Check your email for the 6-digit verification code</small>
                </div>
                
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" required placeholder="Create a password">
                </div>
                
                <div class="form-group">
                    <label for="signup-confirm-password">Confirm Password</label>
                    <input type="password" id="signup-confirm-password" name="confirm_password" required placeholder="Confirm your password">
                </div>
                
                <button type="submit" class="btn btn-primary" id="signup-submit-btn" disabled>Sign Up</button>
            </form>
            
            <div class="signin-footer">
                <a href="index.html" class="back-link">← Back to Portfolio</a>
            </div>
        </div>
    </div>
</body>
</html>
